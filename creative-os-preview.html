<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Creative OS QA</title>
  <link rel="stylesheet" href="creative-os.css?v=1">
  <style>
    *{box-sizing:border-box}html,body{margin:0;min-height:100%;background:#070912;color:#f8f7ff;font-family:Inter,system-ui,sans-serif}body{padding:16px}#root{max-width:1600px;margin:auto}
  </style>
</head>
<body>
  <main id="root"></main>
  <script src="creative-os.js?v=1"></script>
  <script>
    const view = new URLSearchParams(location.search).get("view") || "overview";
    HHCreativeOS.mount(document.getElementById("root"), {
      view,
      currentUser: { id: "qa", name: "Nguyễn Huy Hoàng", role: "owner" },
      onNavigate(target) { location.href = `?view=${encodeURIComponent(target.split("/").pop())}`; }
    });
  </script>
</body>
</html>
