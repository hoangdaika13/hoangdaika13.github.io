<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Hoangdaika</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Arial, sans-serif;
      background: #101820;
      color: #f5f7fa;
    }

    main {
      width: min(720px, calc(100% - 32px));
      text-align: center;
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(40px, 8vw, 84px);
      letter-spacing: 0;
    }

    p {
      margin: 0;
      font-size: 20px;
      color: #c8d3df;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <main>
    <h1>Hoangdaika</h1>
    <p>Trang HTML dau tien cua toi tren GitHub Pages.</p>
  </main>
</body>
</html>
